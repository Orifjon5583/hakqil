<!doctype html>
<html lang="uz">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dars nazorati // Teacher Console</title>
    <style>
      :root { color-scheme: dark; font-family: "Cascadia Code", Consolas, monospace; }
      * { box-sizing: border-box; }
      body {
        min-height: 100vh;
        margin: 0;
        background: #050908;
        color: #a7ff83;
        background-image: radial-gradient(circle at top, #0e231a 0, #050908 52%);
      }
      header {
        border-bottom: 1px solid #1d5b3b;
        background: #07110ed9;
        box-shadow: 0 0 18px #00ff6a22;
      }
      .window-bar {
        display: flex;
        gap: 8px;
        align-items: center;
        padding: 9px 16px;
        border-bottom: 1px solid #18382a;
        color: #75b693;
        font-size: 12px;
      }
      .dot { width: 10px; height: 10px; border-radius: 50%; background: #ff5f56; }
      .dot:nth-child(2) { background: #ffbd2e; }
      .dot:nth-child(3) { background: #27c93f; }
      .window-title { margin-left: 8px; }
      .terminal-head { padding: 16px 22px 18px; }
      h1 { margin: 0; color: #d3ffd0; font-size: 20px; text-shadow: 0 0 8px #3cff7199; }
      h1::before { content: "root@teacher:~# "; color: #46ff7a; }
      #summary { margin-top: 9px; color: #8bcca4; font-size: 13px; }
      #summary::before { content: "[monitor] "; color: #46ff7a; }
      main {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
        gap: 16px;
        padding: 18px;
      }
      .card {
        overflow: hidden;
        border: 1px solid #23643e;
        border-radius: 4px;
        background: #07110e;
        box-shadow: 0 0 14px #00ff6a18;
      }
      .card-head { display: flex; justify-content: space-between; padding: 11px 12px; border-bottom: 1px solid #18382a; }
      .name { color: #d3ffd0; font-weight: 700; }
      .name::before { content: "host://"; color: #61bd81; }
      .status { padding: 2px 7px; border: 1px solid; border-radius: 2px; font-size: 11px; }
      .online { border-color: #29d663; color: #74ff9b; background: #0c3a20; }
      .offline { border-color: #9a4747; color: #ff8a8a; background: #3a1515; }
      img { display: block; width: 100%; aspect-ratio: 16 / 9; background: #020403; object-fit: contain; }
      .last-seen { padding: 9px 12px; border-top: 1px solid #18382a; color: #75b693; font-size: 12px; }
      .last-seen::before { content: "$ last_seen --host "; color: #46ff7a; }
      .empty { padding: 18px; color: #75b693; }
      .empty::before { content: "root@teacher:~# "; color: #46ff7a; }
    </style>
  </head>
  <body>
    <header>
      <div class="window-bar">
        <span class="dot"></span><span class="dot"></span><span class="dot"></span>
        <span class="window-title">teacher-console — secure monitoring dashboard</span>
      </div>
      <div class="terminal-head">
        <h1>./dars-nazorati --status</h1>
        <div id="summary">Studentlar yuklanmoqda...</div>
      </div>
    </header>
    <main id="students"></main>
    <script>
      const container = document.getElementById("students");
      const summary = document.getElementById("summary");

      function studentCard(student) {
        const card = document.createElement("section");
        card.className = "card";

        const head = document.createElement("div");
        head.className = "card-head";
        const name = document.createElement("span");
        name.className = "name";
        name.textContent = student.name;
        const status = document.createElement("span");
        status.className = `status ${student.online ? "online" : "offline"}`;
        status.textContent = student.online ? "Online" : "Offline";
        head.append(name, status);

        const screenshot = document.createElement("img");
        screenshot.alt = `${student.name} ekrani`;
        screenshot.src = `${student.screenshot_url}?t=${Date.now()}`;

        const lastSeen = document.createElement("div");
        lastSeen.className = "last-seen";
        lastSeen.textContent = `Oxirgi aktiv vaqt: ${new Date(student.last_seen).toLocaleString()}`;

        card.append(head, screenshot, lastSeen);
        return card;
      }

      async function refresh() {
        try {
          const response = await fetch("/api/students", { cache: "no-store" });
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          const students = await response.json();
          container.replaceChildren(...students.map(studentCard));
          if (!students.length) {
            const empty = document.createElement("div");
            empty.className = "empty";
            empty.textContent = "Hozircha screenshot kelmadi.";
            container.append(empty);
          }
          const online = students.filter(student => student.online).length;
          summary.textContent = `Jami: ${students.length}. Online: ${online}. Offline chegarasi: {{ offline_seconds }} soniya.`;
        } catch (error) {
          summary.textContent = `Dashboard yangilanmadi: ${error.message}`;
        }
      }

      refresh();
      setInterval(refresh, 2000);
    </script>
  </body>
</html>
